services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    container_name: ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        pid=$$!
        ollama list
        ollama pull nomic-embed-text:latest
        wait $$pid
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
      - MODELS=nomic-embed-text:latest
  db:
    image: pgvector/pgvector:pg16
    shm_size: 1gb
    ports:
      - 5433:5432
    volumes:
      - data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=citation_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d citation_db"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: always
    container_name: db
  backend:
    image: citation-manager-backend:latest
    depends_on:
      ollama:
        condition: service_healthy
      db:
        condition: service_healthy
    ports:
      - 8090:8090
    environment:
      - DEV_USERNAME=postgres
      - DEV_PASSWORD=postgres
      - DEV_DB_URL_DOCKER=jdbc:postgresql://db:5432/citation_db
      - OLLAMA_URL_DOCKER=http://ollama:11434
    restart: always
  frontend:
    build:
      context: ./frontend/citation-manager
      dockerfile: Dockerfile
    image: citation-manager-frontend:latest
    depends_on:
      - backend
    ports:
      - 5173:5173
    environment:
      - VITE_API_BASE_URL=http://localhost:8090
    restart: always
volumes:
  data:
    driver: local